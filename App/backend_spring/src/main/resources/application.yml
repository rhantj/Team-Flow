server:
  port: ${PORT:8080}
  address: 0.0.0.0

spring:
  application:
    name: workflow-ai-backend
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 120MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:workflow}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

workflow:
  ai:
    base-url: ${WORKFLOW_AI_FASTAPI_URL:http://localhost:8000}
  cors:
    allowed-origins: ${WORKFLOW_CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl-seconds: 1800
    refresh-token-ttl-seconds: 1209600
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/v1/auth/google/callback}
  frontend:
    base-url: ${WORKFLOW_FRONTEND_BASE_URL:http://localhost:5173}
