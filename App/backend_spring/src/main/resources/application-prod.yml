# SPRING_PROFILES_ACTIVE=prod 로 활성화되는 배포용 프로필.
# server.port / server.address / CORS 허용 도메인은 application.yml의 환경변수 치환으로 이미 배포 대응되어 있으므로
# 이 파일은 배포 환경에서 명시적으로 고정하고 싶은 값만 선언한다.

logging:
  level:
    root: INFO
    org.springframework.web: WARN

# SecurityConfig가 /swagger-ui/**, /v3/api-docs/**를 인증 없이 permitAll 하고 있으므로,
# 프로덕션에서는 API 스펙 자체가 외부에 노출되지 않도록 springdoc을 완전히 비활성화한다.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

spring:
  datasource:
    hikari:
      initialization-fail-timeout: ${SPRING_DATASOURCE_INIT_FAIL_TIMEOUT:0}
  jpa:
    hibernate:
      # Flyway를 쓰지 않으므로(App/DEPLOY_OCI.md 8절 참고), 배포 전 수동 ALTER TABLE이 빠지면
      # 앱이 틀린 스키마로 기동하는 대신 여기서 막혀야 한다 — update로 바꾸지 말 것(운영 DB에
      # 예측 불가능한 DDL을 자동 실행해 데이터 손실 위험이 있다). base(application.yml)와
      # 같은 기본값이지만, 운영 프로필에서 의도를 명확히 하기 위해 여기서도 명시한다.
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}

workflow:
  demo:
    seed-enabled: ${WORKFLOW_DEMO_SEED_ENABLED:false}
    dev-login-enabled: ${WORKFLOW_DEMO_DEV_LOGIN_ENABLED:false}
